# Docker Compose - Développement avec WebSocket (Daphne)
services:
  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    volumes:
      - fullstack_postgres_data_protected:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME:-fullstack_db}
      - POSTGRES_USER=${DB_USER:-fullstack_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-fullstack_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fullstack_user} -d ${DB_NAME:-fullstack_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  # Cache Redis (pour Django Cache + Channels)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # ports:
    #   - "6380:6379" # Commenté pour éviter les conflits de ports sur la machine hôte (le backend communique en interne via le réseau Docker)
    volumes:
      - redis_data:/data
    networks:
      - app-network

  # Backend Django avec WebSocket (Daphne)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 backend.asgi:application"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backup-db.sh:/backup-db.sh
      - ./backups:/backups
    env_file:
      - .env
    environment:
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  # Frontend (Vite dev server)
  frontend:
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  fullstack_postgres_data_protected:
    external: true
  redis_data:
  static_volume:
  media_volume:
