version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=pharmacie
      - POSTGRES_USER=pharmadmin
      - POSTGRES_PASSWORD=securepassword # À changer en production
    restart: always

  backend:
    build: ./backend
    command: gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DATABASE_URL=postgres://pharmadmin:securepassword@db:5432/pharmacie
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DEBUG=False
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend/frontend
    ports:
      - "80:80"
    volumes:
      - static_volume:/usr/share/nginx/html/static:ro
    depends_on:
      - backend
    restart: always

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume:
