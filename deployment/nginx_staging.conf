server {
    listen 80;
    server_name YOUR_SERVER_IP_OR_DOMAIN;

    location = /favicon.ico { access_log off; log_not_found off; }
    
    # Frontend (React Build)
    # Assurez-vous d'avoir exécuté `npm run build`
    location / {
        root /var/www/fullstack/frontend/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    location /api/ {
        include proxy_params;
        proxy_pass http://unix:/var/www/fullstack/backend/fullstack.sock;
    }
    
    # Django Admin Proxy
    location /admin/ {
        include proxy_params;
        proxy_pass http://unix:/var/www/fullstack/backend/fullstack.sock;
    }

    # Fichiers Statiques Django
    # Assurez-vous d'avoir exécuté `python manage.py collectstatic`
    location /static/ {
        alias /var/www/fullstack/backend/staticfiles/;
    }
    
    # Fichiers Media Django (Uploads)
    location /media/ {
        alias /var/www/fullstack/backend/media/;
    }
}
