<!DOCTYPE html>
<html>
<head>
    <title>Test WebSocket</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .connected { color: green; }
        .disconnected { color: red; }
        .message { background: #f0f0f0; padding: 10px; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>Test WebSocket - Caisse</h1>
    <div id="status" class="disconnected">Non connecté</div>
    <button onclick="connect()">Connecter WebSocket</button>
    <button onclick="disconnect()">Déconnecter</button>
    <button onclick="sendPing()">Envoyer Ping</button>
    <div id="messages"></div>

    <script>
        let ws = null;

        function connect() {
            ws = new WebSocket('ws://localhost:8001/ws/cashier/');
            
            ws.onopen = () => {
                document.getElementById('status').textContent = 'Connecté';
                document.getElementById('status').className = 'connected';
                addMessage('✅ Connecté au WebSocket');
                
                // Envoyer ping
                ws.send(JSON.stringify({ type: 'ping' }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                addMessage('📥 Reçu: ' + JSON.stringify(data));
            };

            ws.onclose = () => {
                document.getElementById('status').textContent = 'Déconnecté';
                document.getElementById('status').className = 'disconnected';
                addMessage('❌ Déconnecté');
            };

            ws.onerror = (error) => {
                addMessage('⚠️ Erreur: ' + error);
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
            }
        }

        function sendPing() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'ping' }));
                addMessage('📤 Envoyé: ping');
            } else {
                addMessage('⚠️ WebSocket non connecté');
            }
        }

        function addMessage(msg) {
            const div = document.createElement('div');
            div.className = 'message';
            div.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
            document.getElementById('messages').appendChild(div);
        }
    </script>
</body>
</html>
