services:
  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    volumes:
      - fullstack_postgres_data_protected:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-fullstack_db}
      - POSTGRES_USER=${DB_USER:-fullstack_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-fullstack_password}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-fullstack_user} -d ${DB_NAME:-fullstack_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'
        reservations:
          memory: 512M
    networks:
      - app-network

  # Backend Django
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-}
      - DJANGO_ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://frontend}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost,http://frontend}
      # Autoriser tous les origines CORS (dangereux en prod — overridez via .env)
      - CORS_ALLOW_ALL=true
      # Choisir le fournisseur pour import auto (FOURNISSEUR1, FOURNISSEUR2, etc.)
      - SUPPLIER_DATA=${SUPPLIER_DATA:-}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-fullstack_db}
      - DB_USER=${DB_USER:-fullstack_user}
      - DB_PASSWORD=${DB_PASSWORD:-fullstack_password}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/api/health/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 768M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - app-network

  # Frontend (React servi par Nginx)
  frontend:
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile.prod
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - backend
    restart: always
    networks:
      - app-network

  # Cache Redis
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - app-network

  # Tunnel ngrok pour accès externe
  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "frontend:80"
    ports:
      - "4040:4040"
    depends_on:
      - frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  fullstack_postgres_data_protected:
    external: true
  static_volume:
  media_volume:
  redis_data:
