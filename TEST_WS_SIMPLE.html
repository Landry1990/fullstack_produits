<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test WebSocket</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1e293b; color: white; }
        button { padding: 15px; margin: 10px; font-size: 16px; cursor: pointer; background: #6366f1; color: white; border: none; border-radius: 8px; }
        button:hover { background: #4f46e5; }
        .connected { color: #22c55e; }
        .disconnected { color: #ef4444; }
        .message { background: #334155; padding: 10px; margin: 5px 0; border-radius: 5px; font-family: monospace; }
        #status { font-size: 18px; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🧪 Test WebSocket - Caisse Centrale</h1>
    <div id="status" class="disconnected">⚪ Non connecté</div>
    
    <button onclick="connect()">1️⃣ Connecter WebSocket</button>
    <button onclick="sendPing()">2️⃣ Envoyer Ping</button>
    <button onclick="disconnect()">❌ Déconnecter</button>
    
    <h3>Messages :</h3>
    <div id="messages"></div>

    <script>
        let ws = null;

        function connect() {
            const url = 'ws://localhost:8000/ws/cashier/';
            addMessage('🔄 Connexion à ' + url);
            
            ws = new WebSocket(url);
            
            ws.onopen = () => {
                document.getElementById('status').textContent = '🟢 Connecté';
                document.getElementById('status').className = 'connected';
                addMessage('✅ Connecté au WebSocket !');
                
                // Envoyer ping automatique
                ws.send(JSON.stringify({type: 'ping'}));
                addMessage('📤 Ping envoyé');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                addMessage('📥 Réponse: ' + JSON.stringify(data));
            };

            ws.onclose = () => {
                document.getElementById('status').textContent = '🔴 Déconnecté';
                document.getElementById('status').className = 'disconnected';
                addMessage('❌ Connexion fermée');
            };

            ws.onerror = (error) => {
                addMessage('⚠️ Erreur: ' + error);
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function sendPing() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'ping'}));
                addMessage('📤 Ping envoyé manuellement');
            } else {
                addMessage('⚠️ WebSocket non connecté ! Clique "Connecter" d\'abord');
            }
        }

        function addMessage(msg) {
            const div = document.createElement('div');
            div.className = 'message';
            div.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
            document.getElementById('messages').prepend(div);
        }
    </script>
</body>
</html>
